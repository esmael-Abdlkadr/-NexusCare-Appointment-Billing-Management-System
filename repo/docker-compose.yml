version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: nexuscare-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootsecret
      MYSQL_DATABASE: ${DB_DATABASE:-nexuscare}
      MYSQL_USER: ${DB_USERNAME:-nexuscare}
      MYSQL_PASSWORD: ${DB_PASSWORD:-nexuscare_secret}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    networks:
      - nexuscare-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nexuscare-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/var/www
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-nexuscare}
      DB_USERNAME: ${DB_USERNAME:-nexuscare}
      DB_PASSWORD: ${DB_PASSWORD:-nexuscare_secret}
      APP_KEY: ${APP_KEY:-}
      JWT_SECRET: ${JWT_SECRET:-}
      JWT_TTL: 720
      APP_URL: ${APP_URL:-http://localhost:8000}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
    networks:
      - nexuscare-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nexuscare-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - nexuscare-net

volumes:
  mysql_data:

networks:
  nexuscare-net:
    driver: bridge
